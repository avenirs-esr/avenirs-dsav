name: Auto-deploy Docs + Storybook (no need to run it)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build VitePress docs
        run: npm run docs:build

      - name: 🏗️ Build Storybook
        run: npm run storybook:build

      - name: 📂 Copy Storybook into docs output
        run: |
          rm -rf docs/.vitepress/dist/storybook
          mkdir -p docs/.vitepress/dist/storybook
          cp -r storybook-static/* docs/.vitepress/dist/storybook/

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          user_name: github-actions
          user_email: github-actions@users.noreply.github.com
