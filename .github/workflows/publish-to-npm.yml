name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-to-npm:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Verify tag is from a release branch
        id: check_release
        run: |
          # Get current tag
          TAG_REF=${GITHUB_REF#refs/tags/}
          echo "Tag detected: $TAG_REF"

          # Check distant branches with the tag commit
          BRANCHES=$(git branch -r --contains $TAG_REF | grep 'origin/release/' || echo "")
          if [ -z "$BRANCHES" ]; then
            echo "Tag $TAG_REF is not on a release/* branch, skipping publish."
            exit 1
          fi
          echo "Tag $TAG_REF is on branch(es): $BRANCHES"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Generate auto-imports
        run: npm run build-only

      - name: 🧠 TypeScript type checking
        run: npm run type-check

      - name: 🧹 Run ESLint
        run: npm run lint

      - name: 🏗️ Build package
        run: npm run build

      - name: 🚀 Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
