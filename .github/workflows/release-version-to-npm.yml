name: Release new version to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Type of version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install deps
        run: npm ci

      - name: 🖊️ Configure Git user
        run: |
          git config --global user.name  "avenirs-dsav-bot[bot]"
          git config --global user.email "avenirs-dsav-bot[bot]@users.noreply.github.com"

      - name: 🚀 Run release
        run: npm run release:${{ github.event.inputs.bump }}

      - name: ⬆️ Push tags and commits
        run: |
          git push origin HEAD --follow-tags
